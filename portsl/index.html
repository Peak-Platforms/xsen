<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSEN Operator Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #222222;
    --accent:   #e8c84a;
    --red:      #cc2200;
    --green:    #00cc66;
    --text:     #e8e8e8;
    --muted:    #666666;
    --school-primary: #cc2200;
    --school-secondary: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .login-box {
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 3rem;
  }

  .login-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .login-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.5rem;
  }

  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
  }

  .field-input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    padding: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }

  .login-error {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--red);
    margin-top: 1rem;
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .topbar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .school-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--school-primary);
    color: var(--school-secondary);
    padding: 0.3rem 0.75rem;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .btn-logout {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-logout:hover { color: var(--text); border-color: var(--text); }

  /* ── STATION TOGGLE ── */
  .station-banner {
    margin: 2rem;
    padding: 2rem;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1.5rem;
  }

  .station-info h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .station-info p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.4rem;
  }

  .station-controls {
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .toggle-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .toggle {
    position: relative;
    width: 60px;
    height: 28px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #1a1a1a;
    border: 1px solid var(--border);
    transition: background 0.3s;
  }

  .toggle input:checked + .toggle-track { background: var(--green); border-color: var(--green); }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: var(--muted);
    transition: transform 0.3s, background 0.3s;
  }

  .toggle input:checked ~ .toggle-thumb {
    transform: translateX(32px);
    background: #000;
  }

  .on-air-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.5s infinite;
    display: none;
  }

  .on-air-dot.active { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(204,34,0,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(204,34,0,0); }
  }

  .on-air-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin: 0 2rem 2rem;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
  }

  /* ── EPISODE CARDS ── */
  .episode-list { padding: 0.5rem; }

  .episode-card {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .episode-card:last-child { border-bottom: none; }
  .episode-card:hover { background: rgba(255,255,255,0.02); }

  .ep-school-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem;
    background: var(--border);
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .ep-title {
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .ep-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .ep-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn-approve, .btn-reject, .btn-preview {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.75rem;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-approve { background: var(--green); color: #000; }
  .btn-reject  { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-preview { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-approve:hover, .btn-reject:hover, .btn-preview:hover { opacity: 0.75; }

  /* ── AIRED EPISODES ── */
  .aired-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .aired-item:last-child { border-bottom: none; }

  .aired-title {
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .aired-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
    text-align: right;
  }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin: 0 2rem 1.5rem;
  }

  .stat-box {
    background: var(--surface);
    padding: 1.5rem;
    text-align: center;
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* ── SCRIPT PREVIEW MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    overflow-y: auto;
    padding: 1.5rem;
    flex: 1;
  }

  .modal-ep-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    line-height: 1.3;
  }

  .script-text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-wrap;
  }

  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  /* ── EMPTY STATE ── */
  .empty {
    padding: 3rem;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem 1.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    z-index: 900;
    transform: translateY(100px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red);   }

  /* ── LOADING ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">XSEN</div>
    <div class="login-subtitle">Operator Portal</div>

    <label class="field-label">School Code</label>
    <input class="field-input" id="login-school" type="text" placeholder="OU" autocomplete="off" spellcheck="false">

    <label class="field-label">Password</label>
    <input class="field-input" id="login-password" type="password" placeholder="••••••••">

    <button class="btn-primary" onclick="login()">SIGN IN</button>
    <div class="login-error" id="login-error">Invalid school code or password.</div>
  </div>
</div>

<!-- ── DASHBOARD ─────────────────────────────────────────────── -->
<div id="dashboard">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">XSEN</div>
      <div class="school-badge" id="school-badge">OU</div>
    </div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <div class="on-air-dot" id="on-air-dot"></div>
        <span class="on-air-text" id="on-air-text" style="display:none">ON AIR</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Station Toggle Banner -->
  <div class="station-banner">
    <div class="station-info">
      <h2 id="station-name">Oklahoma Sooners</h2>
      <p id="station-stream">stream.xsen.fun/listen/xsen_sooners/radio.mp3</p>
    </div>
    <div class="station-controls">
      <div class="toggle-wrap">
        <span class="toggle-label" id="toggle-status-text">OFFLINE</span>
        <label class="toggle">
          <input type="checkbox" id="station-toggle" onchange="toggleStation()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label" style="color:var(--muted)">BROADCAST</span>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-number" id="stat-aired">—</div>
      <div class="stat-label">Episodes Aired</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="stat-pending">—</div>
      <div class="stat-label">Awaiting Review</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="stat-hours">—</div>
      <div class="stat-label">Hours On Air</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="grid">

    <!-- Episode Queue -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Episode Queue — Awaiting Review</span>
        <span class="panel-count" id="queue-count">0</span>
      </div>
      <div id="episode-queue" class="episode-list">
        <div class="loading"><div class="spinner"></div>LOADING...</div>
      </div>
    </div>

    <!-- Aired Episodes -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Recently Aired</span>
        <span class="panel-count" id="aired-count">0</span>
      </div>
      <div id="aired-list">
        <div class="loading"><div class="spinner"></div>LOADING...</div>
      </div>
    </div>

  </div>
</div>

<!-- ── SCRIPT PREVIEW MODAL ──────────────────────────────────── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Script Preview</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-ep-title" id="modal-title"></div>
      <div class="script-text" id="modal-script"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-reject" onclick="modalAction('rejected')">REJECT</button>
      <button class="btn-approve" onclick="modalAction('approved')">APPROVE &amp; QUEUE</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://hvqzrdlbtfezwuveincs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2cXpyZGxidGZlend1dmVpbmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyOTA1MTgsImV4cCI6MjA3ODg2NjUxOH0.30_fdpT1hu_m3zyf-8IywXWIozjIDnqv5RHs6T9hCTo'; // replace with your anon key

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentStation = null;
let currentEpisodeId = null;

// ─── LOGIN ────────────────────────────────────────────────────────────────────
async function login() {
  const school = document.getElementById('login-school').value.trim().toUpperCase();
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!school || !password) {
    errEl.textContent = 'Enter school code and password.';
    errEl.style.display = 'block';
    return;
  }

  const { data, error } = await sb
    .from('xsen_stations')
    .select('*')
    .eq('school', school)
    .eq('operator_password', password)
    .single();

  if (error || !data) {
    errEl.textContent = 'Invalid school code or password.';
    errEl.style.display = 'block';
    return;
  }

  currentStation = data;
  sessionStorage.setItem('xsen_station', JSON.stringify(data));
  showDashboard();
}

// Allow enter key to login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
});

function logout() {
  currentStation = null;
  sessionStorage.removeItem('xsen_station');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // Set school branding
  const s = currentStation;
  document.getElementById('school-badge').textContent = s.school;
  document.getElementById('station-name').textContent = s.name;
  document.getElementById('station-stream').textContent = s.stream_url || '';

  document.documentElement.style.setProperty('--school-primary', s.color_primary || '#cc2200');
  document.documentElement.style.setProperty('--school-secondary', s.color_secondary || '#ffffff');

  // Station toggle
  const toggle = document.getElementById('station-toggle');
  toggle.checked = s.active;
  updateOnAirIndicator(s.active);

  await loadStats();
  await loadQueue();
  await loadAired();
}

function updateOnAirIndicator(active) {
  const dot  = document.getElementById('on-air-dot');
  const text = document.getElementById('on-air-text');
  const label = document.getElementById('toggle-status-text');

  if (active) {
    dot.classList.add('active');
    text.style.display = 'block';
    label.textContent = 'LIVE';
    label.style.color = 'var(--green)';
  } else {
    dot.classList.remove('active');
    text.style.display = 'none';
    label.textContent = 'OFFLINE';
    label.style.color = 'var(--muted)';
  }
}

// ─── STATION TOGGLE ───────────────────────────────────────────────────────────
async function toggleStation() {
  const active = document.getElementById('station-toggle').checked;

  const { error } = await sb
    .from('xsen_stations')
    .update({ active, updated_at: new Date().toISOString() })
    .eq('school', currentStation.school);

  if (error) {
    showToast('Failed to update station status', 'error');
    document.getElementById('station-toggle').checked = !active;
    return;
  }

  currentStation.active = active;
  sessionStorage.setItem('xsen_station', JSON.stringify(currentStation));
  updateOnAirIndicator(active);
  showToast(active ? 'Station is now LIVE' : 'Station paused', active ? 'success' : '');
}

// ─── STATS ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const school = currentStation.school;

  const [{ count: aired }, { count: pending }, { data: airedEps }] = await Promise.all([
    sb.from('xsen_episodes').select('*', { count: 'exact', head: true }).eq('school', school).eq('status', 'aired'),
    sb.from('xsen_episodes').select('*', { count: 'exact', head: true }).eq('school', school).eq('status', 'script_ready'),
    sb.from('xsen_episodes').select('duration_estimate').eq('school', school).eq('status', 'aired')
  ]);

  const totalSecs = airedEps?.reduce((sum, e) => sum + (e.duration_estimate || 0), 0) || 0;
  const hours = (totalSecs / 3600).toFixed(1);

  document.getElementById('stat-aired').textContent   = aired || 0;
  document.getElementById('stat-pending').textContent = pending || 0;
  document.getElementById('stat-hours').textContent   = hours;
}

// ─── EPISODE QUEUE ────────────────────────────────────────────────────────────
async function loadQueue() {
  const { data, error } = await sb
    .from('xsen_episodes')
    .select('id, title, school, episode_type, duration_estimate, score, script')
    .eq('school', currentStation.school)
    .eq('status', 'script_ready')
    .order('score', { ascending: false })
    .limit(20);

  const container = document.getElementById('episode-queue');
  document.getElementById('queue-count').textContent = data?.length || 0;

  if (!data?.length) {
    container.innerHTML = '<div class="empty">NO EPISODES AWAITING REVIEW</div>';
    return;
  }

  container.innerHTML = data.map(ep => `
    <div class="episode-card" id="ep-${ep.id}">
      <div class="ep-school-tag">${ep.school} · ${ep.episode_type?.replace('_', ' ').toUpperCase()}</div>
      <div class="ep-title">${ep.title}</div>
      <div class="ep-meta">
        <span>~${Math.round((ep.duration_estimate || 0) / 60)} min</span>
        <span>Score: ${ep.score || '—'}/10</span>
      </div>
      <div class="ep-actions">
        <button class="btn-preview" onclick="previewScript('${ep.id}', ${JSON.stringify(ep.title).replace(/'/g,"\\'")} , ${JSON.stringify(ep.script || '').replace(/'/g,"\\'")})">PREVIEW</button>
        <button class="btn-approve" onclick="updateEpisode('${ep.id}', 'approved')">APPROVE</button>
        <button class="btn-reject"  onclick="updateEpisode('${ep.id}', 'rejected')">REJECT</button>
      </div>
    </div>
  `).join('');
}

async function updateEpisode(id, status) {
  const { error } = await sb
    .from('xsen_episodes')
    .update({ status, approved_at: new Date().toISOString() })
    .eq('id', id);

  if (error) { showToast('Update failed', 'error'); return; }

  const card = document.getElementById(`ep-${id}`);
  if (card) card.remove();

  const count = document.getElementById('queue-count');
  count.textContent = Math.max(0, parseInt(count.textContent) - 1);

  showToast(status === 'approved' ? 'Approved — queued for voicing' : 'Episode rejected', status === 'approved' ? 'success' : '');

  if (status === 'aired') loadAired();
  loadStats();
}

// ─── AIRED EPISODES ───────────────────────────────────────────────────────────
async function loadAired() {
  const { data } = await sb
    .from('xsen_episodes')
    .select('id, title, duration_estimate, approved_at')
    .eq('school', currentStation.school)
    .eq('status', 'aired')
    .order('approved_at', { ascending: false })
    .limit(15);

  const container = document.getElementById('aired-list');
  document.getElementById('aired-count').textContent = data?.length || 0;

  if (!data?.length) {
    container.innerHTML = '<div class="empty">NO AIRED EPISODES YET</div>';
    return;
  }

  container.innerHTML = data.map(ep => `
    <div class="aired-item">
      <div class="aired-title">${ep.title}</div>
      <div class="aired-meta">
        ~${Math.round((ep.duration_estimate || 0) / 60)}m<br>
        ${ep.approved_at ? new Date(ep.approved_at).toLocaleDateString() : ''}
      </div>
    </div>
  `).join('');
}

// ─── SCRIPT PREVIEW MODAL ─────────────────────────────────────────────────────
function previewScript(id, title, script) {
  currentEpisodeId = id;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-script').textContent = script || 'No script available.';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentEpisodeId = null;
}

async function modalAction(status) {
  if (!currentEpisodeId) return;
  await updateEpisode(currentEpisodeId, status);
  closeModal();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const saved = sessionStorage.getItem('xsen_station');
if (saved) {
  currentStation = JSON.parse(saved);
  showDashboard();
}
</script>
