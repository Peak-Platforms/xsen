<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSEN FanCast — Episode Review</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0e;
    --surface: #0e1117;
    --panel: #13181f;
    --border: #1e2530;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --accent3: #47aaff;
    --text: #e8eaf0;
    --muted: #5a6478;
    --school-ou: #841617;
    --school-osu: #ff6600;
    --school-texas: #bf5700;
    --school-master: #2a3547;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .logo span {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
    margin-left: 12px;
    font-family: 'DM Mono', monospace;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 64px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }

  .sidebar-section {
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 16px;
  }

  .filter-btn {
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--muted);
    text-align: left;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--panel);
    color: var(--text);
  }

  .filter-btn.active {
    border-left: 2px solid var(--accent);
    color: var(--accent);
  }

  .count-badge {
    background: var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .filter-btn.active .count-badge {
    background: var(--accent);
    color: var(--bg);
  }

  /* Main content */
  .content {
    overflow-y: auto;
    padding: 24px 32px;
  }

  .content-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .content-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text);
  }

  .refresh-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Episode cards */
  .episode-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .episode-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .episode-card:hover { border-color: #2e3d52; }

  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    cursor: pointer;
    user-select: none;
  }

  .school-tag {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 2px;
    min-width: 72px;
    text-align: center;
    flex-shrink: 0;
  }

  .school-MASTER { background: var(--school-master); color: var(--accent3); }
  .school-OU { background: var(--school-ou); color: #ffcdd2; }
  .school-OSU { background: var(--school-osu); color: #fff3e0; }
  .school-TEXAS { background: var(--school-texas); color: #ffe0b2; }

  .card-meta {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-stats {
    display: flex;
    gap: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .stat { display: flex; align-items: center; gap: 4px; }

  .episode-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border: 1px solid;
  }

  .type-full_episode { border-color: var(--accent); color: var(--accent); }
  .type-news_drop { border-color: var(--accent3); color: var(--accent3); }

  .card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .btn {
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-approve {
    background: transparent;
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-approve:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-reject {
    background: transparent;
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-reject:hover {
    background: var(--accent2);
    color: #fff;
  }

  .btn-read {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-read:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  .btn-play {
    background: transparent;
    border-color: #b47fff;
    color: #b47fff;
  }
  .btn-play:hover {
    background: #b47fff;
    color: var(--bg);
  }

  .btn-download {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-download:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  .audio-panel {
    display: none;
    border-top: 1px solid rgba(180,127,255,0.2);
    padding: 20px 24px;
    background: rgba(180,127,255,0.04);
  }
  .audio-panel.open { display: block; }
  .audio-panel audio {
    width: 100%;
    height: 36px;
  }
  .audio-meta {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .audio-meta a {
    color: #b47fff;
    text-decoration: none;
    letter-spacing: 1px;
  }
  .audio-meta a:hover { text-decoration: underline; }

  /* Script viewer */
  .script-panel {
    display: none;
    border-top: 1px solid var(--border);
    padding: 24px 20px;
    background: #0a0d12;
  }

  .script-panel.open { display: block; }

  .script-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 2;
    color: #b0b8cc;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .script-text::-webkit-scrollbar { width: 4px; }
  .script-text::-webkit-scrollbar-track { background: var(--bg); }
  .script-text::-webkit-scrollbar-thumb { background: var(--border); }

  /* PAUSE markers */
  .script-text { }

  /* Status badges */
  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
  }

  .status-script_ready { color: var(--accent3); border: 1px solid var(--accent3); }
  .status-approved { color: var(--accent); border: 1px solid var(--accent); }
  .status-rejected { color: var(--accent2); border: 1px solid var(--accent2); }
  .status-voiced { color: #b47fff; border: 1px solid #b47fff; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* Search / Sort bar */
  .search-sort-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .sort-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .sort-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-right: 4px;
  }
  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .sort-btn:hover { border-color: var(--muted); color: var(--text); }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Score badge on cards */
  .score-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    min-width: 48px;
    text-align: center;
    flex-shrink: 0;
  }
  .score-10, .score-9 { color: var(--accent2); }
  .score-8, .score-7 { color: var(--accent); }
  .score-6, .score-5 { color: var(--accent3); }
  .score-4, .score-3, .score-2, .score-1 { color: var(--muted); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .loading::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.error {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .stat-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">XSEN <span>FANCAST / EPISODE REVIEW</span></div>
  <div class="status-bar">
    <div class="live-dot"></div>
    <span id="clock">--:--:--</span>
    <span id="pipeline-status">PIPELINE ACTIVE</span>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">Filter by Status</div>
    <button class="filter-btn active" onclick="setFilter('script_ready')" id="filter-script_ready">
      Script Ready <span class="count-badge" id="count-script_ready">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('approved')" id="filter-approved">
      Approved <span class="count-badge" id="count-approved">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('rejected')" id="filter-rejected">
      Rejected <span class="count-badge" id="count-rejected">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('voiced')" id="filter-voiced">
      Voiced <span class="count-badge" id="count-voiced">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('all')" id="filter-all">
      All Episodes <span class="count-badge" id="count-all">0</span>
    </button>

    <div class="sidebar-section">Filter by School</div>
    <button class="filter-btn" onclick="setSchool('ALL')" id="school-ALL">All Schools</button>
    <button class="filter-btn" onclick="setSchool('MASTER')" id="school-MASTER">Master</button>
    <button class="filter-btn" onclick="setSchool('OU')" id="school-OU">OU Sooners</button>
    <button class="filter-btn" onclick="setSchool('OSU')" id="school-OSU">OSU Cowboys</button>
    <button class="filter-btn" onclick="setSchool('TEXAS')" id="school-TEXAS">Texas Longhorns</button>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Ready to Voice</div>
        <div class="stat-value" id="stat-ready">0</div>
        <div class="stat-sub">episodes queued</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Approved</div>
        <div class="stat-value" id="stat-approved">0</div>
        <div class="stat-sub">this session</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Runtime</div>
        <div class="stat-value" id="stat-runtime">0m</div>
        <div class="stat-sub">approved content</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Voiced</div>
        <div class="stat-value" id="stat-voiced">0</div>
        <div class="stat-sub">ready for AzuraCast</div>
      </div>
    </div>

    <div class="content-header">
      <div class="content-title" id="section-title">SCRIPT REVIEW QUEUE</div>
      <button class="refresh-btn" onclick="loadEpisodes()">↻ REFRESH</button>
    </div>
    <div class="search-sort-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search by title or topic..." oninput="renderEpisodes()">
      <div class="sort-controls">
        <span class="sort-label">SORT</span>
        <button class="sort-btn active" id="sort-score" onclick="setSort('score')">Score ↓</button>
        <button class="sort-btn" id="sort-date" onclick="setSort('date')">Newest</button>
        <button class="sort-btn" id="sort-duration" onclick="setSort('duration')">Duration</button>
      </div>
    </div>

    <div id="episode-list" class="episode-list">
      <div class="loading">LOADING EPISODES</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Config ───────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://hvqzrdlbtfezwuveincs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2cXpyZGxidGZlend1dmVpbmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyOTA1MTgsImV4cCI6MjA3ODg2NjUxOH0.30_fdpT1hu_m3zyf-8IywXWIozjIDnqv5RHs6T9hCTo';

  // ─── State ────────────────────────────────────────────────────────────────
  let allEpisodes = [];
  let currentFilter = 'script_ready';
  let currentSchool = 'ALL';
  let openCards = new Set();
  let openAudio = new Set();
  let currentSort = 'score';

  // ─── Clock ────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ─── Supabase Fetch ───────────────────────────────────────────────────────
  async function fetchEpisodes() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/xsen_episodes?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
    return res.json();
  }

  async function updateEpisodeStatus(id, status, approvedBy = 'kevin') {
    const body = { status };
    if (status === 'approved') {
      body.approved_by = approvedBy;
      body.approved_at = new Date().toISOString();
    }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/xsen_episodes?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(body)
    });
    return res.ok;
  }

  // ─── Filter Logic ─────────────────────────────────────────────────────────
  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.remove('active'));
    document.getElementById(`filter-${filter}`)?.classList.add('active');
    renderEpisodes();
  }

  function setSchool(school) {
    currentSchool = school;
    document.querySelectorAll('[id^="school-"]').forEach(b => b.classList.remove('active'));
    document.getElementById(`school-${school}`)?.classList.add('active');
    renderEpisodes();
  }

  function getFiltered() {
    const query = document.getElementById('search-input')?.value?.toLowerCase() || '';
    let results = allEpisodes.filter(ep => {
      const statusMatch = currentFilter === 'all' || ep.status === currentFilter;
      const schoolMatch = currentSchool === 'ALL' || ep.school === currentSchool;
      const searchMatch = !query || ep.title?.toLowerCase().includes(query);
      return statusMatch && schoolMatch && searchMatch;
    });
    // Sort
    results.sort((a, b) => {
      if (currentSort === 'score') return (b.relevance_score || 0) - (a.relevance_score || 0);
      if (currentSort === 'date') return new Date(b.created_at) - new Date(a.created_at);
      if (currentSort === 'duration') return (b.duration_estimate || 0) - (a.duration_estimate || 0);
      return 0;
    });
    return results;
  }

  function setSort(sort) {
    currentSort = sort;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + sort)?.classList.add('active');
    renderEpisodes();
  }

  // ─── Stats ────────────────────────────────────────────────────────────────
  function updateStats() {
    const counts = {};
    let approvedRuntime = 0;
    let voicedCount = 0;

    allEpisodes.forEach(ep => {
      counts[ep.status] = (counts[ep.status] || 0) + 1;
      if (ep.status === 'approved') approvedRuntime += ep.duration_estimate || 0;
      if (ep.status === 'voiced') voicedCount++;
    });

    document.getElementById('count-script_ready').textContent = counts['script_ready'] || 0;
    document.getElementById('count-approved').textContent = counts['approved'] || 0;
    document.getElementById('count-rejected').textContent = counts['rejected'] || 0;
    document.getElementById('count-voiced').textContent = counts['voiced'] || 0;
    document.getElementById('count-all').textContent = allEpisodes.length;

    document.getElementById('stat-ready').textContent = counts['script_ready'] || 0;
    document.getElementById('stat-approved').textContent = counts['approved'] || 0;
    document.getElementById('stat-runtime').textContent = `${Math.round(approvedRuntime / 60)}m`;
    document.getElementById('stat-voiced').textContent = voicedCount;
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function formatDuration(seconds) {
    if (!seconds) return '?m';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function highlightPauses(text) {
    return text.replace(/\[PAUSE\]/g, '<span style="color:#e8ff47;opacity:0.6">[PAUSE]</span>');
  }

  function renderEpisodes() {
    const filtered = getFiltered();
    const list = document.getElementById('episode-list');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📻</div>No episodes in this filter.</div>`;
      return;
    }

    list.innerHTML = filtered.map((ep, i) => `
      <div class="episode-card" id="card-${ep.id}" style="animation-delay:${i * 0.05}s">
        <div class="card-header" onclick="toggleScript('${ep.id}')">
          <div class="score-badge score-${ep.relevance_score || 0}">${ep.relevance_score || '?'}</div>
          <div class="school-tag school-${ep.school}">${ep.school}</div>
          <div class="card-meta">
            <div class="card-title">${ep.title}</div>
            <div class="card-stats">
              <span class="stat">⏱ ${formatDuration(ep.duration_estimate)}</span>
              <span class="episode-type-badge type-${ep.episode_type}">${ep.episode_type?.replace('_', ' ').toUpperCase()}</span>
              <span class="status-badge status-${ep.status}">${ep.status?.replace('_', ' ').toUpperCase()}</span>
              <span class="stat">${formatDate(ep.created_at)}</span>
            </div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            ${ep.status === 'script_ready' ? `
              <button class="btn btn-approve" onclick="approve('${ep.id}')">✓ APPROVE</button>
              <button class="btn btn-reject" onclick="reject('${ep.id}')">✗ REJECT</button>
            ` : ep.status === 'rejected' ? `
              <button class="btn btn-approve" onclick="approve('${ep.id}')">↺ RESTORE</button>
            ` : ep.status === 'voiced' && ep.audio_url ? `
              <button class="btn btn-play" onclick="toggleAudio('${ep.id}')">▶ PLAY</button>
              <a class="btn-download" href="${ep.audio_url}" target="_blank" download>↓ MP3</a>
            ` : `
              <span class="status-badge status-${ep.status}">${ep.status?.toUpperCase()}</span>
            `}
          </div>
        </div>
        ${ep.status === 'voiced' && ep.audio_url ? `
        <div class="audio-panel ${openAudio.has(ep.id) ? 'open' : ''}" id="audio-${ep.id}">
          <audio controls src="${ep.audio_url}" preload="none"></audio>
          <div class="audio-meta">
            <span>${ep.audio_url.split('/').pop()}</span>
            <a href="${ep.audio_url}" target="_blank">↗ OPEN IN NEW TAB</a>
          </div>
        </div>
        ` : ''}
        <div class="script-panel ${openCards.has(ep.id) ? 'open' : ''}" id="script-${ep.id}">
          <div class="script-text">${highlightPauses(ep.script || 'No script available.')}</div>
        </div>
      </div>
    `).join('');
  }

  function toggleScript(id) {
    if (openCards.has(id)) {
      openCards.delete(id);
    } else {
      openCards.add(id);
    }
    const panel = document.getElementById(`script-${id}`);
    if (panel) panel.classList.toggle('open');
  }

  function toggleAudio(id) {
    if (openAudio.has(id)) {
      openAudio.delete(id);
    } else {
      openAudio.add(id);
    }
    const panel = document.getElementById(`audio-${id}`);
    if (panel) panel.classList.toggle('open');
  }

  // ─── Actions ──────────────────────────────────────────────────────────────
  async function approve(id) {
    const ok = await updateEpisodeStatus(id, 'approved');
    if (ok) {
      const ep = allEpisodes.find(e => e.id === id);
      if (ep) ep.status = 'approved';
      showToast('✓ EPISODE APPROVED — QUEUED FOR VOICING');
      updateStats();
      renderEpisodes();
    } else {
      showToast('UPDATE FAILED', true);
    }
  }

  async function reject(id) {
    const ok = await updateEpisodeStatus(id, 'rejected');
    if (ok) {
      const ep = allEpisodes.find(e => e.id === id);
      if (ep) ep.status = 'rejected';
      showToast('✗ EPISODE REJECTED', true);
      updateStats();
      renderEpisodes();
    }
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${isError ? 'error' : ''}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ─── Load ─────────────────────────────────────────────────────────────────
  async function loadEpisodes() {
    document.getElementById('episode-list').innerHTML = '<div class="loading">LOADING EPISODES</div>';
    try {
      allEpisodes = await fetchEpisodes();
      updateStats();
      renderEpisodes();
    } catch (err) {
      document.getElementById('episode-list').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div>Failed to load: ${err.message}<br><br>Check SUPABASE_URL and SUPABASE_ANON_KEY in this file.</div>`;
    }
  }

  // Auto-refresh every 60 seconds
  setInterval(loadEpisodes, 60000);
  loadEpisodes();
</script>
</body>
</html>
